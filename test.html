<!doctype html>
<html>
    <head>
        <style>
            #hit {font-weight: bold;}
        </style>
    </head>
    <body>
        <span id="hit"></span>
    </body>
    <script>
        var xmlHttp = new XMLHttpRequest();
        xmlHttp.open('GET', 'https://hitcounter.pythonanywhere.com/count', false);
        xmlHttp.send(null);
        document.getElementById('hit').innerText = xmlHttp.responseText;
    </script>
</html>
