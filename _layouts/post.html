---
layout: default
---

<div id="page-title">
  <h1>{{ page.title }}</h1>
  <div>
    Last updated: {{ page.updated }}{% if page.tags.size > 0 %},
    {% assign tag = page.tags | first %}
      Tag: <a href="{{ site.url | append: '/tag/' | append: tag }}">{{ tag }}</a>,
    {% endif %}
    <span id="counter"><span id="counter-title"></span>Hits (Yesterday / Today / Total): <span id="counter-hits"></span></span>
    <!--<img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url={{ site.url }}{{ page.url }}"/>-->
  </div>
</div>
<div id="content">
  {{ content }} 
</div>
<div class="padding">&nbsp;</div>

  </div>

</div>
