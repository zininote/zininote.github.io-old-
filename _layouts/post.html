    {% if page.tags.size > 0 %}
      {% assign tag = page.tags | first %}
      Tag: <a href="{{ site.url | append: '/tag/' | append: tag }}">{{ tag }}</a>,
    {% endif %}
    <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url={{ site.url }}{{ page.url }}&count_bg=%2300000000&title_bg=%2300000000&title=Hits%3A&edge_flat=true"/>
  </div>
</div>
