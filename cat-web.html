---
layout: default
permalink: /cat/web
title: web
---

<div id="tag-title">
  <h1>{{ page.title }} 카테고리 포스팅들</h1>
</div>
<div id="cat-content">
  {% assign sorted = site.posts %}
  {% for post in sorted %}
    {% if post.cat == page.title %}
      <div class="post-list">
        <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
        <div class="post-desc">Last updated: {{ post.updated }}</div>
      </div>
    {% endif %}
  {% endfor %}
</div>
